spring.application.name=batchflow

# JPA / HIBERNATE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Active profile: override with SPRING_PROFILES_ACTIVE env var
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# SPRING SECURITY: Disable default auto-config (we provide custom SecurityFilterChain)
spring.security.user.name=
spring.security.user.password=

# SPRINGDOC-OPENAPI (Swagger UI)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.syntaxHighlight.activate=true
